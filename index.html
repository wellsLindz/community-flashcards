<style>

#card{margin:20px auto;max-width:900px;cursor:pointer}
img{max-width:90vw;max-height:75vh;border:1px solid #999;box-shadow:0 2px 8px rgba(0,0,0,.2)}
button{margin:8px;padding:10px 18px;font-size:16px}
</style></head><body>
<h2>Flashcards</h2>
<div><button onclick="prev()">Previous</button><button onclick="flip()">Flip</button><button onclick="next()">Next</button><button onclick="shuffle()">Shuffle</button></div>
<div id="card"><img id="img"></div>
<script>
const cards=[

{front:"fronts/front travel.png",back:"backs/back travel.png"},
{front:"fronts/front wellness.jpg",back:"backs/back wellness.jpg"},
];
let order=[...cards.keys()];
let idx=0,showFront=true;
function show(){document.getElementById('img').src=showFront?cards[order[idx]].front:cards[order[idx]].back;}
function flip(){showFront=!showFront;show();}
function next(){idx=(idx+1)%order.length;showFront=true;show();}
function prev(){idx=(idx-1+order.length)%order.length;showFront=true;show();}
function shuffle(){for(let i=order.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}idx=0;showFront=true;show();}
document.getElementById('card').onclick=flip;
show();
</script></body></html>
